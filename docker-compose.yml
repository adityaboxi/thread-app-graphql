
services:
  thread-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thread-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/threadapp
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: thread-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=threadapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: